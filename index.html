<!DOCTYPE html>
<html>
<head>
<title>Pedal Forever</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:#eaeaea;
  background:#000;
}

:root {
  --accent:#7df9c1;
  --gold:#d4a63c;
}

body::before {
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:url('website-wallpaper.jpg') center/cover no-repeat;
  opacity:0.12;
  z-index:-1;
}

.wrap { max-width:1000px; margin:auto; padding:0 15px; }

/* HERO */
.hero { text-align:center; padding:80px 15px 40px; }
.tagline { color:var(--accent); letter-spacing:5px; font-size:11px; }
.hero h1 { font-size:44px; }

.nav {
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:15px;
}
.nav a { color:var(--accent); text-decoration:none; }

/* STRIP */
.strip {
  display:flex;
  justify-content:center;
  gap:20px;
  background:var(--accent);
  color:black;
  padding:10px;
  font-weight:bold;
}

/* STORY */
.story {
  margin:50px auto;
  max-width:600px;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-left:4px solid var(--accent);
}

/* FEATURE POSTER */
.feature-poster {
  margin:60px auto;
  text-align:center;
}

.feature-poster img {
  width:100%;
  max-width:850px;
  border-radius:10px;
}

/* ===== VOTE SECTION ===== */
.vote-section {
  margin-top:60px;
  padding:30px;
  background:#0c0c0c;
  border-radius:10px;
  text-align:center;
}

.vote-title {
  color:var(--accent);
  margin-bottom:20px;
}

/* BIKE CARDS */
.vote-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.vote-card {
  background:#111;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  border:1px solid rgba(125,249,193,0.2);
}

.vote-card img {
  width:100%;
  height:260px;
  object-fit:contain; /* 🔥 FIXES CROPPING */
  background:#000;
}

.vote-info {
  padding:12px;
}

/* ===== MODAL ===== */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal img {
  max-width:90%;
  max-height:70%;
}

.modal-controls {
  margin-top:20px;
}

.modal-btn {
  padding:10px 20px;
  margin:0 10px;
  border:1px solid var(--accent);
  background:none;
  color:var(--accent);
  cursor:pointer;
}

.close-btn {
  position:absolute;
  top:20px;
  right:20px;
  font-size:24px;
  cursor:pointer;
}

/* EMAIL */
.email-box input {
  margin-top:20px;
  padding:10px;
  width:220px;
  background:#000;
  border:1px solid var(--accent);
  color:white;
}

/* CTA */
.collection-cta {
  text-align:center;
  padding:40px;
  border-top:2px solid var(--accent);
  border-bottom:2px solid var(--accent);
  margin-top:60px;
}

.collection-cta a {
  padding:12px 24px;
  border:2px solid var(--accent);
  color:var(--accent);
  text-decoration:none;
}

.social-bar {
  margin:50px 0;
  display:flex;
  justify-content:center;
  gap:40px;
}

.contact { text-align:center; }

@media(max-width:900px){
  .vote-grid { grid-template-columns:1fr; }
}

</style>
</head>

<body>

<div class="wrap">

<div class="hero">
  <div class="tagline">LIVE FREE OR RIDE</div>
  <h1>PEDAL FOREVER</h1>
  <div class="nav">
    <a href="collection.html">Collection</a>
    <a href="#">Apparel</a>
    <a href="#">Mopeds</a>
  </div>
</div>

<div class="strip">
  <div>REAL FINDS</div>
  <div>RESTORED</div>
  <div>NEW ENGLAND</div>
</div>

<div class="story">Earned, not assembled.</div>

<!-- 🔥 YOUR FEATURE POSTER (UNCHANGED) -->
<div class="feature-poster">
  <img src="feature-poster.png">
</div>

<!-- 🔥 VOTE SECTION -->
<div class="vote-section">

<div class="vote-title">Vote the Next Bike of the Month</div>

<div class="vote-grid">

<!-- GT -->
<div class="vote-card" onclick="openGallery('gt')">
  <img src="gtmach1-1.jpg">
  <div class="vote-info">1990 GT Mach 1 — Dayglo Yellow</div>
</div>

<!-- RAMPAR -->
<div class="vote-card" onclick="openGallery('rampar')">
  <img src="rampar-1.jpg">
  <div class="vote-info">1978 Team Rampar — Nickel Motomag</div>
</div>

</div>

<div class="email-box">
<input id="email" placeholder="Enter email for free giveaway">
</div>

<p id="status"></p>
<p>Total Votes: <span id="total">0</span></p>

</div>

<div class="collection-cta">
<a href="collection.html">VIEW FULL COLLECTION</a>
</div>

<div class="social-bar">
<a href="https://youtube.com/@pedalforever">YouTube</a>
<a href="https://tiktok.com/@pedalforever">TikTok</a>
</div>

<div class="contact">
<a href="mailto:jgclsales@gmail.com">contact me here</a>
</div>

</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal">
<span class="close-btn" onclick="closeModal()">✕</span>
<img id="modal-img">
<div class="modal-controls">
<button class="modal-btn" onclick="prevImage()">←</button>
<button class="modal-btn" onclick="nextImage()">→</button>
</div>
</div>

<script>

const galleries = {
  gt: ["gtmach1-1.jpg","gtmach1-2.jpg"],
  rampar: ["rampar-1.jpg","rampar-2.jpg"]
};

let currentGallery = [];
let currentIndex = 0;

function openGallery(type){
  currentGallery = galleries[type];
  currentIndex = 0;
  document.getElementById("modal").style.display="flex";
  showImage();
}

function showImage(){
  document.getElementById("modal-img").src = currentGallery[currentIndex];
}

function nextImage(){
  currentIndex = (currentIndex + 1) % currentGallery.length;
  showImage();
}

function prevImage(){
  currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
  showImage();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
