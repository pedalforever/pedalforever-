<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pedal Forever Factory Racing Team</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent:#7df9c1;
      --accent2:#ff4fd8;
      --gold:#ffd83d;
      --dark:#050505;
      --panel:rgba(0,0,0,0.78);
      --red:#ff2b2b;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:'Orbitron', sans-serif;
      background:#000;
      color:#eaeaea;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:url('website-wallpaper.jpg') center/cover no-repeat;
      opacity:0.12;
      z-index:-1;
    }

    a{color:inherit;}

    .main{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100vh;
    }

    .sidebar{
      padding:20px;
      border-right:1px solid rgba(125,249,193,0.15);
      background:rgba(0,0,0,0.55);
    }

    .sidebar h3{
      color:var(--accent);
      margin-top:0;
      letter-spacing:2px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      margin:8px 0;
      font-size:13px;
      padding:8px 10px;
      border:1px solid rgba(125,249,193,0.18);
      border-radius:6px;
    }

    .sidebar a:hover{
      color:#000;
      background:var(--accent);
    }

    .sidebar-media-box{
      margin-top:22px;
      padding:10px;
      border:2px solid var(--accent);
      border-radius:16px;
      background:rgba(0,0,0,.92);
      box-shadow:0 0 22px rgba(125,249,193,.35);
    }

    .sidebar-media-title{
      color:var(--accent);
      text-align:center;
      font-size:10px;
      letter-spacing:2px;
      margin:0 0 8px;
    }

    .video-stack{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .video-card{
      border:1px solid rgba(125,249,193,.35);
      border-radius:10px;
      overflow:hidden;
      background:#000;
    }

    .video-card video{
      width:100%;
      display:block;
    }

    .video-label{
      padding:6px;
      font-size:8px;
      color:#fff;
      text-align:center;
      background:rgba(125,249,193,.12);
      letter-spacing:1px;
    }

    .bully-promo{
      position:relative;
      display:block;
      margin-top:12px;
      border-radius:12px;
      overflow:hidden;
      border:2px solid rgba(255,79,216,.65);
      box-shadow:0 0 18px rgba(255,79,216,.35);
      background:#000;
    }

    .bully-promo img{
      width:100%;
      display:block;
    }

    .promo-hotspot{
      position:absolute;
      z-index:4;
      display:block;
    }

    .promo-hotspot.tiktok{
      left:43%;
      top:70%;
      width:52%;
      height:11%;
    }

    .promo-hotspot.youtube{
      left:43%;
      top:82%;
      width:52%;
      height:11%;
    }

    .wrap{
      max-width:1050px;
      width:100%;
      margin:auto;
      padding:0 15px 40px;
    }

    .hero{
      text-align:center;
      padding:45px 15px 25px;
    }

    .site-logo{
      max-width:330px;
      width:82%;
      height:auto;
      display:block;
      margin:0 auto 14px;
      filter:drop-shadow(0 0 18px rgba(125,249,193,0.4));
    }

    .tagline{
      color:var(--accent);
      letter-spacing:4px;
      font-size:11px;
      margin-bottom:10px;
    }

    .hero h1{
      position:absolute;
      left:-9999px;
    }

    .social{margin-top:18px;}

    .social a{
      display:inline-block;
      margin:5px;
      padding:10px 18px;
      border:1px solid var(--accent);
      color:var(--accent);
      text-decoration:none;
      font-size:13px;
      border-radius:999px;
      background:rgba(0,0,0,0.45);
    }

    .social a:hover{
      background:var(--accent);
      color:#000;
    }

    .strip{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      background:var(--accent);
      color:black;
      font-weight:bold;
      margin:18px 0 26px;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 0 18px rgba(125,249,193,0.28);
    }

    .strip div{
      padding:12px 8px;
      text-align:center;
      border-right:1px solid rgba(0,0,0,0.22);
      font-size:12px;
    }

    .strip div:last-child{border-right:none;}

    .story{
      margin:30px auto;
      max-width:720px;
      background:var(--panel);
      padding:22px;
      border-left:4px solid var(--accent);
      border-radius:10px;
      line-height:1.6;
      text-align:center;
    }

    .factory-team{
      margin:55px auto;
      padding:30px 18px;
      border-radius:22px;
      background:
