<!DOCTYPE html>
<html>
<head>
<title>Pedal Forever</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  margin:0;
  background:#0a0a0a;
  color:#eaeaea;
  font-family: 'Trebuchet MS', Arial, sans-serif;
}

/* ===== BACKGROUND ===== */
body::before {
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:url('website-wallpaper.jpg') center/cover no-repeat;
  opacity:0.15; /* subtle, not blasting */
  z-index:-2;
}

/* ===== GRAIN OVERLAY ===== */
body::after {
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background-image:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:0.05;
  z-index:-1;
}

/* ===== HEADER ===== */
.header {
  padding:40px 20px 10px;
  text-align:center;
}

.tagline {
  color:#00ffc3;
  letter-spacing:4px;
  font-size:12px;
}

.title {
  font-size:42px;
  letter-spacing:5px;
  margin:10px 0;
}

.location {
  color:#999;
}

/* ===== NAV ===== */
.nav {
  display:flex;
  justify-content:center;
  gap:25px;
  margin:20px 0;
  flex-wrap:wrap;
}

.nav a {
  color:#00ffc3;
  text-decoration:none;
  font-weight:bold;
  font-size:14px;
  position:relative;
}

.nav a::after {
  content:'';
  position:absolute;
  bottom:-5px;
  left:0;
  width:0;
  height:2px;
  background:#00ffc3;
  transition:0.3s;
}

.nav a:hover::after {
  width:100%;
}

/* ===== STORY BLOCK ===== */
.story {
  max-width:700px;
  margin:60px auto;
  padding:30px;
  border-left:4px solid #00ffc3;
  background:#111;
  line-height:1.7;
  font-size:16px;
}

/* ===== FEATURE ===== */
.feature {
  max-width:800px;
  margin:60px auto;
  text-align:center;
}

.feature img {
  width:100%;
  max-width:500px;
  border-radius:10px;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.feature h2 {
  margin-top:20px;
  color:#00ffc3;
}

/* ===== GRID ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:25px;
  max-width:1000px;
  margin:60px auto;
  padding:0 20px;
}

.card {
  background:#111;
  padding:10px;
  border-radius:8px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  border-radius:6px;
}

.card p {
  margin-top:8px;
  font-size:14px;
}
