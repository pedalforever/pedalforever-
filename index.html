<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedal Forever - Bike of the Month</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
  text-align: center;
  padding: 40px;
}

h1 {
  margin-bottom: 10px;
}

.bike-container {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 30px;
}

.bike {
  border: 2px solid #333;
  padding: 20px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  border: 2px solid #00ffcc;
  background: transparent;
  color: #00ffcc;
  cursor: pointer;
}

button:hover {
  background: #00ffcc;
  color: black;
}

.leader {
  box-shadow: 0 0 20px #00ffcc;
  transform: scale(1.05);
}

input {
  padding: 10px;
  margin-top: 20px;
  width: 250px;
}
</style>
</head>

<body>

<h1>🔥 Bike of the Month 🔥</h1>
<p>Vote once. Winner gets the glory.</p>

<input id="email" placeholder="Enter your email to vote">

<div class="bike-container">
  <div class="bike" id="optionA">
    <h2>Bike A</h2>
    <button onclick="submitVote('A')">Vote A</button>
    <p>Votes: <span id="countA">0</span></p>
  </div>

  <div class="bike" id="optionB">
    <h2>Bike B</h2>
    <button onclick="submitVote('B')">Vote B</button>
    <p>Votes: <span id="countB">0</span></p>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔑 PASTE YOUR KEYS HERE
const SUPABASE_URL = "https://mpxdtcontzizhbuigjwl.supabase.co";
const SUPABASE_KEY = "sb_publishable_2zgVrnX29Z7G_BKjGQKWFQ_qkRDTaAv";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let hasVoted = localStorage.getItem("voted");

// SUBMIT VOTE
async function submitVote(choice) {
  if (hasVoted) {
    alert("You already voted 🔒");
    return;
  }

  const email = document.getElementById("email").value;

  if (!email || !email.includes("@")) {
    alert("Enter a valid email");
    return;
  }

  // check duplicate email
  const { data: existing } = await supabase
    .from("votes")
    .select("*")
    .eq("email", email);

  if (existing.length > 0) {
    alert("This email already voted 🚫");
    return;
  }

  // insert vote
  const { error } = await supabase
    .from("votes")
    .insert([{ choice, email }]);

  if (error) {
    alert("Vote failed");
    console.error(error);
    return;
  }

  localStorage.setItem("voted", true);
  hasVoted = true;

  alert("Vote locked in 🔥");

  loadVotes();
}

// LOAD VOTES
async function loadVotes() {
  const { data, error } = await supabase
    .from("votes")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  let countA = data.filter(v => v.choice === "A").length;
  let countB = data.filter(v => v.choice === "B").length;

  document.getElementById("countA").innerText = countA;
  document.getElementById("countB").innerText = countB;

  // highlight leader
  if (countA > countB) {
    document.getElementById("optionA").classList.add("leader");
    document.getElementById("optionB").classList.remove("leader");
  } else if (countB > countA) {
    document.getElementById("optionB").classList.add("leader");
    document.getElementById("optionA").classList.remove("leader");
  }

  // 300th vote trigger
  if (data.length === 300) {
    alert("🎉 300TH VOTER WINS 🎉");
  }
}

document.addEventListener("DOMContentLoaded", loadVotes);
</script>

</body>
</html>
