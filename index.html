<!DOCTYPE html>
<html>
<head>
<title>Pedal Forever</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron', sans-serif;
  background:#000;
  color:#eaeaea;
}

:root{
  --accent:#7df9c1;
}

body::before{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:url('website-wallpaper.jpg') center/cover no-repeat;
  opacity:0.12;
  z-index:-1;
}

.wrap{max-width:1100px;margin:auto;padding:0 15px;}

.hero{text-align:center;padding:80px 15px 40px;}
.tagline{color:var(--accent);letter-spacing:4px;font-size:11px;}
.hero h1{font-size:46px;margin:10px 0;}

.nav{display:flex;justify-content:center;gap:20px;}
.nav a{color:var(--accent);text-decoration:none;}

.strip{
  display:flex;
  justify-content:center;
  gap:20px;
  background:var(--accent);
  color:black;
  padding:10px;
  font-weight:bold;
}

.story{
  margin:40px auto;
  max-width:600px;
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-left:4px solid var(--accent);
}

/* FEATURE POSTER */
.feature-poster{
  margin:60px auto;
  text-align:center;
}

.feature-poster img{
  width:100%;
  max-width:950px;
  border-radius:10px;
  box-shadow:0 0 25px rgba(125,249,193,0.3);
}

/* VOTE */
.vote-box{
  margin:60px 0;
  padding:25px;
  background:#0a0a0a;
  border-radius:10px;
  text-align:center;
  border:1px solid rgba(125,249,193,0.2);
}

.vote-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.vote-card{
  border:1px solid rgba(125,249,193,0.3);
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.vote-card:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px rgba(125,249,193,0.4);
}

.vote-images{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
}

.vote-images img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.vote-title{
  padding:10px;
  font-size:13px;
}

.email-box input{
  margin-top:20px;
  padding:10px;
  width:220px;
  background:#000;
  border:1px solid var(--accent);
  color:white;
}

.collection-cta{
  text-align:center;
  padding:40px;
}

.collection-cta a{
  padding:12px 24px;
  border:2px solid var(--accent);
  color:var(--accent);
  text-decoration:none;
}

@media(max-width:800px){
  .vote-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap">

<!-- HERO -->
<div class="hero">
<div class="tagline">LIVE FREE OR RIDE</div>
<h1>PEDAL FOREVER</h1>

<div class="nav">
<a href="collection.html">Collection</a>
<a href="#">Apparel</a>
<a href="#">Mopeds</a>
</div>
</div>

<!-- STRIP -->
<div class="strip">
<div>REAL FINDS</div>
<div>RESTORED</div>
<div>NEW ENGLAND</div>
</div>

<!-- STORY -->
<div class="story">Earned, not assembled.</div>

<!-- 🔥 FEATURE POSTER (CORRECT FILE) -->
<div class="feature-poster">
<img src="feature-poster.png" alt="Featured Bike">
</div>

<!-- 🔥 VOTE SECTION -->
<div class="vote-box">

<h2 style="color:var(--accent)">Vote the Next Bike of the Month</h2>

<div class="vote-grid">

<!-- GT -->
<div class="vote-card" onclick="vote('GT')">
  <div class="vote-images">
    <img src="gtmach1-1.jpg">
    <img src="gtmach1-2.jpg">
  </div>
  <div class="vote-title">
    1990 GT Mach 1 — Dayglo Yellow<br>
    <small>110% Original</small>
  </div>
</div>

<!-- RAMPAR -->
<div class="vote-card" onclick="vote('RAMPAR')">
  <div class="vote-images">
    <img src="rampar-1.jpg">
    <img src="rampar-2.jpg">
  </div>
  <div class="vote-title">
    1978 Team Rampar — Nickel Motomag<br>
    <small>Refinished w/ Original Parts</small>
  </div>
</div>

</div>

<div class="email-box">
<input id="email" placeholder="Enter email for free giveaway">
</div>

<p id="status"></p>
<p>Total Votes: <span id="total">0</span></p>

</div>

<!-- CTA -->
<div class="collection-cta">
<a href="collection.html">VIEW FULL COLLECTION</a>
</div>

</div>

<script>
let votes = 0;

function vote(choice){
  const email = document.getElementById("email").value;

  if(!email){
    alert("Enter email first");
    return;
  }

  votes++;
  document.getElementById("status").innerText = "Vote submitted for " + choice;
  document.getElementById("total").innerText = votes;
}
</script>

</body>
</html>
