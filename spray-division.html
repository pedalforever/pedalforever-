<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PF Spray Division</title>

<style>

body{
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial, sans-serif;
    background-image:url('spray-booth-wallpaper.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.overlay{
    background:rgba(0,0,0,0.72);
    min-height:100vh;
    padding:40px 20px;
}

h1{
    font-size:48px;
    color:#72ffe2;
    text-transform:uppercase;
    margin-bottom:10px;
}

p{
    max-width:700px;
    line-height:1.6;
    color:#d0d0d0;
}

.image-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
    margin-top:40px;
}

.image-grid img,
.image-grid video{
    width:100%;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.12);
}

.badge{
    display:inline-block;
    margin-bottom:20px;
    padding:8px 14px;
    border:1px solid #72ffe2;
    border-radius:999px;
    color:#72ffe2;
    font-size:12px;
    letter-spacing:2px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="badge">
PF SPRAY DIVISION
</div>

<h1>The Booth</h1>

<p>
Hidden somewhere inside Alvern Heights. Paint dust, fluorescent lights,
chrome haze, and bad decisions sealed permanently under clear coat.
</p>

<div class="image-grid">

<img src="green-bike-1.jpg">

<img src="green-bike-2.jpg">

<video controls playsinline preload="metadata">
<source src="wanna-disco-gt-001.mp4" type="video/mp4">
</video>

</div>

</div>

</body>
</html>
