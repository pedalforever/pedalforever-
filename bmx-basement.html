<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>The BMX Basement | Pedal Forever</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#7df9c1;
  --accent2:#ff4fd8;
  --gold:#ffb347;
  --red:#ff2b2b;
  --white:#eaeaea;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:var(--white);
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:url('bmx-basement-wallpaper-v1.png') center/cover no-repeat;
  opacity:.55;
  z-index:-2;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.75));
  z-index:-1;
  pointer-events:none;
}

.topbar{
  position:sticky;
  top:0;
  z-index:99;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  padding:13px 10px;
  background:rgba(0,0,0,.92);
  border-bottom:1px solid var(--accent);
}

.topbar a{
  color:var(--accent);
  text-decoration:none;
  font-size:11px;
  letter-spacing:1px;
  font-weight:700;
}

.wrap{
  max-width:1150px;
  margin:0 auto;
  padding:40px 16px 70px;
}

.hero{
  text-align:center;
  padding:55px 12px 35px;
}

.kicker{
  color:var(--accent2);
  letter-spacing:3px;
  font-size:12px;
  text-transform:uppercase;
}

.hero h1{
  color:var(--accent);
  font-size:clamp(40px,8vw,82px);
  margin:12px 0;
  text-transform:uppercase;
}

.hero p{
  max-width:820px;
  margin:0 auto;
  color:#ddd;
  line-height:1.75;
}

.warning{
  max-width:850px;
  margin:30px auto 55px;
  padding:18px;
  text-align:center;
  background:rgba(255,43,43,.12);
  border:1px solid rgba(255,43,43,.45);
  border-radius:16px;
  color:#fff;
  line-height:1.6;
}

.tour-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
  margin:45px auto;
}

.tour-card{
  background:rgba(0,0,0,.82);
  border:1px solid rgba(125,249,193,.32);
  border-radius:20px;
  padding:22px;
  box-shadow:0 0 22px rgba(125,249,193,.12);
  transition:.25s ease;
}

.tour-card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 28px rgba(125,249,193,.30);
}

.tour-card h2{
  color:var(--accent);
  margin:0 0 12px;
  text-transform:uppercase;
  font-size:20px;
}

.tour-card p{
  color:#d9d9d9;
  line-height:1.65;
  font-size:13px;
}

.feature-section{
  margin:65px auto;
  padding:26px;
  background:rgba(0,0,0,.84);
  border:1px solid rgba(255,179,71,.35);
  border-radius:22px;
  box-shadow:0 0 26px rgba(255,179,71,.12);
}

.feature-section h2{
  color:var(--gold);
  text-align:center;
  text-transform:uppercase;
  margin-top:0;
}

.feature-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  align-items:center;
}

.feature-img{
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(125,249,193,.25);
  background:#000;
}

.artifact-button{
  display:block;
  width:100%;
  padding:0;
  margin:0;
  border:0;
  background:none;
  cursor:pointer;
  text-align:left;
}

.artifact-collage{
  display:grid;
  gap:10px;
  padding:10px;
}

.artifact-collage img{
  width:100%;
  display:block;
  object-fit:cover;
  border-radius:12px;
  border:1px solid rgba(125,249,193,.22);
  transition:.25s ease;
}

.artifact-button:hover img{
  filter:brightness(1.12);
  transform:scale(1.01);
}

.artifact-main{
  max-height:360px;
}

.artifact-small-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.artifact-small-grid img{
  height:160px;
}

.tap-artifact{
  padding:0 12px 14px;
  color:var(--accent);
  font-size:10px;
  letter-spacing:2px;
  text-align:center;
  text-transform:uppercase;
}

.feature-copy h3{
  color:var(--accent);
  text-transform:uppercase;
  margin-top:0;
  font-size:24px;
}

.feature-copy p{
  color:#ddd;
  line-height:1.75;
  font-size:13px;
}
